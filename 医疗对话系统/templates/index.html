<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明医 — 智能医疗问诊助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
:root{
  --teal:#2a9d8f;--teal-deep:#1f7a6e;--teal-light:#e8f5f2;--teal-glow:rgba(42,157,143,.12);
  --cream:#faf8f5;--cream-deep:#f2efe9;--warm-white:#fffdf9;
  --sage:#8fb996;--sage-light:#d4e6d7;
  --coral:#e07a5f;--coral-light:#fce8e2;
  --ink:#2c3e3a;--ink-light:#5a706a;--ink-muted:#8fa39d;--ink-faint:#b4c4be;
  --gold:#d4a574;--gold-light:#f5ebe0;
  --sidebar-w:300px;--radius:16px;--radius-sm:10px;--radius-xs:6px;
  --shadow-sm:0 1px 3px rgba(44,62,58,.06);--shadow-md:0 4px 16px rgba(44,62,58,.08);
  --shadow-lg:0 8px 32px rgba(44,62,58,.1);--shadow-glow:0 0 24px rgba(42,157,143,.15);
  --transition:all .25s cubic-bezier(.4,0,.2,1)
}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--cream);color:var(--ink)}
.app{display:flex;height:100vh;width:100vw}

/* ─── Sidebar ─── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--warm-white);display:flex;flex-direction:column;border-right:1px solid rgba(42,157,143,.1);position:relative;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{width:0;min-width:0;border-right:none}
.sidebar.collapsed *{visibility:hidden}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(180deg,rgba(42,157,143,.04) 0%,transparent 100%);pointer-events:none}
.sidebar-header{padding:24px 20px 16px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:12px;padding:4px 0}
.logo-icon{width:42px;height:42px;background:linear-gradient(145deg,var(--teal),var(--teal-deep));border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md),var(--shadow-glow);position:relative;overflow:hidden}
.logo-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);border-radius:inherit}
.logo-icon svg{width:24px;height:24px;position:relative;z-index:1}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--ink);letter-spacing:1px}
.logo-sub{font-size:11px;color:var(--ink-muted);font-weight:400;letter-spacing:.5px;margin-top:1px}
.new-chat-btn{width:100%;padding:13px 18px;background:linear-gradient(135deg,var(--teal),var(--teal-deep));border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:10px;font-family:inherit;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.new-chat-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
.new-chat-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md),var(--shadow-glow)}
.new-chat-btn:hover::before{left:100%}
.new-chat-btn:active{transform:translateY(0)}
.new-chat-btn svg{flex-shrink:0}
.conv-label{font-size:11px;color:var(--ink-muted);padding:8px 20px 6px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.conversations{flex:1;overflow-y:auto;padding:4px 10px 16px}
.conv-item{padding:12px 14px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;transition:var(--transition);border:1px solid transparent;position:relative}
.conv-item:hover{background:var(--teal-light);border-color:rgba(42,157,143,.1)}
.conv-item.active{background:linear-gradient(135deg,rgba(42,157,143,.1),rgba(42,157,143,.05));border-color:rgba(42,157,143,.15)}
.conv-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--teal);border-radius:0 2px 2px 0}
.conv-title{font-size:13px;color:var(--ink-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;line-height:1.4}
.conv-item.active .conv-title{color:var(--ink);font-weight:500}
.conv-delete{opacity:0;color:var(--ink-muted);cursor:pointer;padding:4px;border-radius:var(--radius-xs);font-size:16px;transition:var(--transition);flex-shrink:0;background:none;border:none;display:flex;align-items:center;justify-content:center}
.conv-item:hover .conv-delete{opacity:.6}
.conv-delete:hover{opacity:1!important;color:var(--coral);background:var(--coral-light)}
.sidebar-footer{padding:14px 20px;border-top:1px solid rgba(42,157,143,.08);font-size:11px;color:var(--ink-muted);display:flex;align-items:center;gap:8px}
.sidebar-footer svg{flex-shrink:0;opacity:.5}
.status-dot{width:7px;height:7px;background:var(--sage);border-radius:50%;box-shadow:0 0 6px rgba(143,185,150,.5);animation:pulse-dot 2.5s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 6px rgba(143,185,150,.5)}50%{opacity:.6;box-shadow:0 0 12px rgba(143,185,150,.8)}}

/* ─── Main ─── */
.main{flex:1;display:flex;flex-direction:column;background:var(--cream);min-width:0;position:relative}
.main::before{content:'';position:absolute;top:0;right:0;width:400px;height:400px;background:radial-gradient(circle at center,rgba(42,157,143,.03),transparent 70%);pointer-events:none}
.chat-header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid rgba(42,157,143,.08);flex-shrink:0;background:rgba(255,253,249,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative;z-index:2}
.chat-title-area{display:flex;align-items:center;gap:12px}
.heartbeat-line{display:flex;align-items:center;gap:2px;opacity:.35}
.heartbeat-line span{display:block;height:1px;background:var(--teal);border-radius:1px}
.heartbeat-line span:nth-child(1){width:8px}
.heartbeat-line span:nth-child(2){width:12px;height:2px}
.heartbeat-line span:nth-child(3){width:6px;transform:rotate(30deg)}
.heartbeat-line span:nth-child(4){width:6px;transform:rotate(-30deg)}
.heartbeat-line span:nth-child(5){width:12px;height:2px}
.heartbeat-line span:nth-child(6){width:8px}
.chat-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;color:var(--ink)}
.chat-badge{font-size:10px;color:var(--teal);background:var(--teal-light);padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:.5px}

/* ─── Messages ─── */
.messages{flex:1;overflow-y:auto;padding:0;position:relative}
.messages-inner{max-width:780px;margin:0 auto;padding:28px 28px 40px}
.message{margin-bottom:36px;display:flex;flex-direction:column;animation:msg-in .4s ease-out both}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.message.user{align-items:flex-end}
.message.assistant{align-items:flex-start}
.message-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.message-avatar{width:30px;height:30px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.message.user .message-avatar{background:linear-gradient(135deg,var(--gold),#c4915e);color:#fff}
.message.assistant .message-avatar{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#fff}
.message-name{font-size:13px;font-weight:500;color:var(--ink)}
.message-time{font-size:11px;color:var(--ink-muted)}
.message-content{font-size:14.5px;line-height:1.8;color:var(--ink);max-width:85%;word-break:break-word}
.message.user .message-content{background:linear-gradient(135deg,var(--teal-light),rgba(42,157,143,.06));padding:14px 20px;border-radius:var(--radius) var(--radius) var(--radius-xs) var(--radius);border:1px solid rgba(42,157,143,.1)}
.message.assistant .message-content{background:var(--warm-white);padding:18px 22px;border-radius:var(--radius) var(--radius) var(--radius) var(--radius-xs);border:1px solid rgba(42,157,143,.06);box-shadow:var(--shadow-sm)}
.message-content p{margin:0 0 12px;line-height:1.8}
.message-content p:last-child{margin:0}
.message-content pre{background:var(--cream-deep);border:1px solid rgba(42,157,143,.08);border-radius:var(--radius-sm);padding:16px;margin:12px 0;overflow-x:auto;font-size:13px;line-height:1.6;position:relative}
.message-content pre::before{content:'code';position:absolute;top:8px;right:12px;font-size:10px;color:var(--ink-muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.message-content code{font-family:'JetBrains Mono','Fira Code','SF Mono',monospace;font-size:13px}
.message-content pre code{background:none;padding:0;color:var(--ink);display:block}
.message-content code:not(pre code){background:rgba(42,157,143,.08);padding:2px 7px;border-radius:4px;font-size:13px;color:var(--teal-deep);border:1px solid rgba(42,157,143,.06)}
.message-content strong{font-weight:600;color:var(--ink)}
.message-content em{font-style:italic;color:var(--ink-light)}
.message-content h1,.message-content h2,.message-content h3{margin:16px 0 8px;color:var(--ink);font-family:'Noto Serif SC',serif;font-weight:600}
.message-content h1{font-size:18px;padding-bottom:8px;border-bottom:1px solid rgba(42,157,143,.1)}
.message-content h2{font-size:16px}
.message-content h3{font-size:14.5px;color:var(--teal-deep)}
.message-content ul,.message-content ol{margin:8px 0;padding-left:20px}
.message-content li{margin-bottom:4px;line-height:1.8}
.message-content blockquote{border-left:3px solid var(--teal);padding:10px 16px;margin:12px 0;background:rgba(42,157,143,.04);border-radius:0 var(--radius-xs) var(--radius-xs) 0;color:var(--ink-light);font-style:italic}

/* ─── Typing indicator ─── */
.typing-indicator{display:flex;gap:8px;padding:20px 0;align-items:center}
.typing-indicator span{width:8px;height:8px;background:var(--teal);border-radius:50%;animation:typing-bounce 1.4s infinite ease-in-out;opacity:.4}
.typing-indicator span:nth-child(1){animation-delay:0s}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.3s}
@keyframes typing-bounce{0%,80%,100%{transform:scale(.7);opacity:.3}40%{transform:scale(1);opacity:.8}}

/* ─── Welcome screen ─── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;animation:welcome-in .6s ease-out both}
@keyframes welcome-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.welcome-icon{width:80px;height:80px;background:linear-gradient(145deg,var(--teal),var(--teal-deep));border-radius:24px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg),0 0 40px rgba(42,157,143,.2);position:relative;animation:welcome-float 4s ease-in-out infinite}
@keyframes welcome-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.welcome-icon svg{width:40px;height:40px;color:#fff}
.welcome-icon::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.25),transparent)}
.welcome-title{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;color:var(--ink);text-align:center;animation:welcome-in .6s ease-out .1s both}
.welcome-subtitle{font-size:14px;color:var(--ink-muted);text-align:center;max-width:420px;line-height:1.7;animation:welcome-in .6s ease-out .2s both}
.welcome-tips{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;width:100%;max-width:580px;animation:welcome-in .6s ease-out .3s both}
.tip-card{padding:16px;background:var(--warm-white);border:1px solid rgba(42,157,143,.08);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);display:flex;flex-direction:column;gap:8px}
.tip-card:hover{border-color:var(--teal);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.tip-icon{font-size:20px;width:36px;height:36px;background:var(--teal-light);border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center}
.tip-text{font-size:12.5px;color:var(--ink-light);line-height:1.6}

/* ─── Input ─── */
.input-area{padding:16px 28px 24px;flex-shrink:0;position:relative;z-index:2}
.input-area::before{content:'';position:absolute;top:-40px;left:0;right:0;height:40px;background:linear-gradient(180deg,transparent,var(--cream));pointer-events:none}
.input-inner{max-width:780px;margin:0 auto}
.input-disclaimer{text-align:center;font-size:11px;color:var(--ink-muted);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.input-disclaimer svg{flex-shrink:0;opacity:.5}
.input-box{display:flex;align-items:flex-end;background:var(--warm-white);border-radius:18px;padding:8px 8px 8px 20px;transition:var(--transition);border:1.5px solid rgba(42,157,143,.12);box-shadow:var(--shadow-sm)}
.input-box:focus-within{border-color:var(--teal);box-shadow:var(--shadow-md),0 0 0 3px rgba(42,157,143,.08)}
.input-box textarea{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:14.5px;line-height:1.6;resize:none;max-height:150px;font-family:inherit;padding:8px 0}
.input-box textarea::placeholder{color:var(--ink-faint)}
.send-btn{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--teal-deep));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;box-shadow:var(--shadow-sm)}
.send-btn:hover{transform:scale(1.05);box-shadow:var(--shadow-md),var(--shadow-glow)}
.send-btn:disabled{background:var(--cream-deep);cursor:not-allowed;box-shadow:none;transform:none}
.send-btn svg{width:18px;height:18px;color:#fff}
.send-btn:disabled svg{color:var(--ink-faint)}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(42,157,143,.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(42,157,143,.25)}

/* ─── Toast ─── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:var(--radius-sm);font-size:13px;opacity:0;transition:var(--transition);z-index:999;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Delete confirm ─── */
.confirm-overlay{position:fixed;inset:0;background:rgba(44,62,58,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.confirm-overlay.show{opacity:1;pointer-events:all}
.confirm-box{background:var(--warm-white);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-lg);max-width:360px;width:90%;transform:scale(.95);transition:transform .2s;text-align:center}
.confirm-overlay.show .confirm-box{transform:scale(1)}
.confirm-icon{width:48px;height:48px;background:var(--coral-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px}
.confirm-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;color:var(--ink);margin-bottom:8px}
.confirm-text{font-size:13px;color:var(--ink-muted);margin-bottom:20px;line-height:1.6}
.confirm-actions{display:flex;gap:10px;justify-content:center}
.confirm-actions button{padding:10px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition);font-family:inherit;border:none}
.confirm-cancel{background:var(--cream-deep);color:var(--ink-light)}
.confirm-cancel:hover{background:var(--cream)}
.confirm-ok{background:var(--coral);color:#fff}
.confirm-ok:hover{background:#c96a50}

/* ─── Responsive ─── */
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:0;bottom:0;z-index:50;width:280px;transition:left .3s;box-shadow:var(--shadow-lg)}
  .sidebar.open{left:0}
  .mobile-toggle{display:flex!important}
  .welcome-tips{grid-template-columns:1fr}
  .messages-inner,.input-inner{padding-left:16px;padding-right:16px}
}
.mobile-toggle{display:none;width:36px;height:36px;border:none;background:var(--teal-light);border-radius:var(--radius-xs);cursor:pointer;align-items:center;justify-content:center;color:var(--teal)}
.mobile-toggle svg{width:18px;height:18px}
.sidebar-toggle{width:34px;height:34px;border:none;background:transparent;border-radius:var(--radius-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-muted);transition:var(--transition);flex-shrink:0}
.sidebar-toggle:hover{background:var(--teal-light);color:var(--teal)}
.sidebar-toggle svg{width:17px;height:17px}
.sidebar-toggle .line-move{transition:var(--transition)}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A2.3 2.3 0 0 0 2.5 4.6v4.8a2.3 2.3 0 0 0 2.3 2.3h.9l1.2 8.4a1.2 1.2 0 0 0 1.2 1h8.4a1.2 1.2 0 0 0 1.2-1l1.2-8.4h.9a2.3 2.3 0 0 0 2.3-2.3V4.6a2.3 2.3 0 0 0-2.3-2.3H4.8Z"/><path d="M9 14h6"/><path d="M12 11v6"/></svg>
        </div>
        <div class="logo-text">
          <div class="logo-name">明 医</div>
          <div class="logo-sub">智能医疗问诊助手</div>
        </div>
      </div>
      <button class="new-chat-btn" onclick="createNewChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建问诊
      </button>
    </div>
    <div class="conv-label">历史问诊</div>
    <div class="conversations" id="conversations"></div>
    <div class="sidebar-footer">
      <div class="status-dot"></div>
      <span>MING-1.8B 模型运行中</span>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <div class="chat-title-area">
        <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="折叠侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
        <div class="chat-title" id="chatTitle">明医智能问诊</div>
      </div>
      <div class="chat-badge">MING-1.8B</div>
    </div>
    <div class="messages" id="messages">
      <div class="welcome" id="welcome"></div>
    </div>
    <div class="input-area">
      <div class="input-inner">
        <div class="input-disclaimer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
          AI 辅助问诊仅供参考，如有不适请及时就医
        </div>
        <div class="input-box">
          <textarea id="messageInput" rows="1" placeholder="描述您的症状或健康问题..." onkeydown="handleKeyDown(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">&#x1f5d1;</div>
    <div class="confirm-title">删除问诊记录</div>
    <div class="confirm-text">此操作将永久删除该对话，无法恢复。</div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">取消</button>
      <button class="confirm-ok" id="confirmOk">确认删除</button>
    </div>
  </div>
</div>

<script>
let activeConvId=null;let isStreaming=false;let conversations=[];let pendingDeleteId=null;
const STORAGE_KEY='ming_chat_conversations';

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function showConfirm(id){
  pendingDeleteId=id;
  document.getElementById('confirmOverlay').classList.add('show');
  document.getElementById('confirmOk').onclick=()=>{closeConfirm();deleteConv(id)};
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show');pendingDeleteId=null}

function loadLocal(){try{const d=localStorage.getItem(STORAGE_KEY);if(d)conversations=JSON.parse(d)}catch(e){conversations=[]}}
function saveLocal(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(conversations))}catch(e){}}
function createConvId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function createConv(title){const c={id:createConvId(),title:title||'新问诊',created_at:Date.now()/1000};conversations.unshift(c);saveLocal();return c}
function addMsg(convId,role,content){const c=conversations.find(x=>x.id===convId);if(!c)return;c.messages=c.messages||[];c.messages.push({role:role,content:content,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});saveLocal()}

function renderMarkdown(text){
  if(!text)return'';
  let html='';
  const parts=text.split(/```([\s\S]*?)```/);
  parts.forEach((part,i)=>{
    if(i%2===1){
      const lines=part.split('\n');const lang=lines[0].trim();
      const code=lines.slice(1).join('\n');
      html+='<pre><code class="lang-'+lang+'">'+code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></pre>';
    }else{
      part.split('\n\n').forEach(p=>{
        p=p.trim();if(!p)return;
        if(/^#{1,3}\s/.test(p)){
          const level=p.match(/^(#{1,3})/)[1].length;
          const content=p.replace(/^#{1,3}\s*/,'');
          html+='<h'+level+'>'+inline(content)+'</h'+level+'>';
        }else{
          html+='<p>'+inline(p)+'</p>';
        }
      });
    }
  });
  return html;
}
function inline(t){
  return t.replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>');
}

function renderSidebar(){
  const el=document.getElementById('conversations');el.innerHTML='';
  conversations.forEach(c=>{
    const d=document.createElement('div');
    d.className='conv-item'+(c.id===activeConvId?' active':'');
    d.innerHTML='<div class="conv-title">&#x1f4cb; '+c.title+'</div><button class="conv-delete" onclick="event.stopPropagation();showConfirm(\''+c.id+'\')">&#x00d7;</button>';
    d.onclick=()=>loadMessages(c.id);
    el.appendChild(d);
  });
}

function showWelcome(){
  activeConvId=null;
  document.getElementById('chatTitle').textContent='明医智能问诊';
  document.getElementById('messages').innerHTML=`
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A2.3 2.3 0 0 0 2.5 4.6v4.8a2.3 2.3 0 0 0 2.3 2.3h.9l1.2 8.4a1.2 1.2 0 0 0 1.2 1h8.4a1.2 1.2 0 0 0 1.2-1l1.2-8.4h.9a2.3 2.3 0 0 0 2.3-2.3V4.6a2.3 2.3 0 0 0-2.3-2.3H4.8Z"/><path d="M9 14h6"/><path d="M12 11v6"/></svg>
      </div>
      <div class="welcome-title">您好，我是明医</div>
      <div class="welcome-subtitle">基于 MING-1.8B 医疗大模型，为您提供专业的健康咨询与问诊服务。请描述您的症状或健康问题，我将尽力为您解答。</div>
      <div class="welcome-tips">
        <div class="tip-card" onclick="fillInput('最近总是头痛，可能是什么原因？')">
          <div class="tip-icon">&#x1f9e0;</div>
          <div class="tip-text">头痛头晕的常见病因分析</div>
        </div>
        <div class="tip-card" onclick="fillInput('感冒和流感有什么区别？')">
          <div class="tip-icon">&#x1f33b;</div>
          <div class="tip-text">感冒与流感的症状对比</div>
        </div>
        <div class="tip-card" onclick="fillInput('如何改善失眠问题？')">
          <div class="tip-icon">&#x1f4a4;</div>
          <div class="tip-text">失眠的改善建议与调理</div>
        </div>
      </div>
    </div>`;
  renderSidebar();
}

function fillInput(text){
  document.getElementById('messageInput').value=text;
  document.getElementById('messageInput').focus();
}

function loadMessages(convId){
  activeConvId=convId;
  const c=conversations.find(x=>x.id===convId);
  if(!c)return;
  document.getElementById('chatTitle').textContent=c.title;
  const el=document.getElementById('messages');
  el.innerHTML='<div class="messages-inner" id="messagesInner"></div>';
  const inner=document.getElementById('messagesInner');
  (c.messages||[]).forEach(m=>{
    const avatar=m.role==='user'?'&#x1f464;':'&#x2695;';
    const name=m.role==='user'?'我':'明医';
    inner.innerHTML+='<div class="message '+m.role+'"><div class="message-header"><div class="message-avatar">'+avatar+'</div><div class="message-name">'+name+'</div><div class="message-time">'+(m.time||'')+'</div></div><div class="message-content">'+(m.role==='assistant'?renderMarkdown(m.content):'<p>'+m.content.replace(/</g,'&lt;')+'</p>')+'</div></div>';
  });
  el.scrollTop=el.scrollHeight;
  renderSidebar();
}

async function loadConversations(){
  loadLocal();
  try{
    const r=await fetch('/api/conversations');
    const d=await r.json();
    if(d.conversations&&d.conversations.length>0){
      const ids=new Set(conversations.map(c=>c.id));
      d.conversations.forEach(c=>{if(!ids.has(c.id))conversations.push(c)});
      saveLocal();renderSidebar();
    }
  }catch(e){}
}

function getOrCreateConv(){
  if(activeConvId)return activeConvId;
  const c=createConv('新问诊');renderSidebar();
  document.getElementById('chatTitle').textContent=c.title;
  return c.id;
}

async function sendMessage(){
  if(isStreaming)return;
  const inp=document.getElementById('messageInput');
  const text=inp.value.trim();if(!text)return;
  const convId=getOrCreateConv();
  inp.value='';inp.style.height='auto';
  addMsg(convId,'user',text);
  loadMessages(convId);
  isStreaming=true;
  document.getElementById('sendBtn').disabled=true;
  const inner=document.getElementById('messagesInner');
  const now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  inner.innerHTML+='<div class="message assistant"><div class="message-header"><div class="message-avatar">&#x2695;</div><div class="message-name">明医</div><div class="message-time">'+now+'</div></div><div class="message-content" id="streamingMsg"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>';
  const msgEl=document.getElementById('streamingMsg');
  const el=document.getElementById('messages');el.scrollTop=el.scrollHeight;
  let response='';
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,conversation_id:convId})});
    const reader=res.body.getReader();const decoder=new TextDecoder();
    let buffer='';let firstToken=true;
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');buffer=lines.pop();
      for(const line of lines){
        if(line.startsWith('data: ')){
          const data=line.slice(6).trim();if(data==='[DONE]')continue;
          try{
            const parsed=JSON.parse(data);
            if(parsed.error){msgEl.innerHTML='<p style="color:var(--coral)">错误: '+parsed.error+'</p>';break}
            if(parsed.token){
              if(firstToken){msgEl.innerHTML='';firstToken=false}
              response+=parsed.token;
              msgEl.innerHTML=renderMarkdown(response);
              el.scrollTop=el.scrollHeight;
            }
          }catch(e){}
        }
      }
    }
  }catch(e){if(!response)msgEl.innerHTML='<p style="color:var(--coral)">请求失败，请重试</p>'}
  finally{
    if(response)msgEl.innerHTML=renderMarkdown(response);
    const c=conversations.find(x=>x.id===convId);
    if(c&&response){
      const existing=c.messages||[];
      if(!existing.some(m=>m.role==='assistant'&&m.content===response)){addMsg(convId,'assistant',response)}
      if(c.title==='新问诊'&&existing.length>0){
        const firstUser=existing.find(m=>m.role==='user');
        if(firstUser)c.title=firstUser.content.substring(0,25)+(firstUser.content.length>25?'...':'');
        saveLocal();renderSidebar();
        document.getElementById('chatTitle').textContent=c.title;
      }
    }
    isStreaming=false;document.getElementById('sendBtn').disabled=false;
    el.scrollTop=el.scrollHeight;
  }
}

function handleKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function createNewChat(){showWelcome();document.getElementById('messageInput').focus()}
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('sidebarToggle');
  sb.classList.toggle('collapsed');
  const collapsed=sb.classList.contains('collapsed');
  btn.title=collapsed?'展开侧边栏':'折叠侧边栏';
  try{localStorage.setItem('ming_sidebar_collapsed',collapsed?'1':'0')}catch(e){}
}
(function(){
  try{if(localStorage.getItem('ming_sidebar_collapsed')==='1'){document.getElementById('sidebar').classList.add('collapsed');document.getElementById('sidebarToggle').title='展开侧边栏'}}catch(e){}
})();
async function deleteConv(id){
  conversations=conversations.filter(c=>c.id!==id);saveLocal();
  if(activeConvId===id)showWelcome();else renderSidebar();
  showToast('问诊记录已删除');
  try{await fetch('/api/conversations/'+id,{method:'DELETE'})}catch(e){}
}

document.getElementById('messageInput').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,150)+'px';
});

loadConversations();showWelcome();
</script>
</body>
</html>
